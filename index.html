<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trellos — local board</title>
<style>
  :root {
    --bg: #1d2125;
    --board-bg: #161a1d;
    --col-bg: #22272b;
    --col-head: #2c333a;
    --card-bg: #2c333a;
    --card-hover: #353c44;
    --text: #b6c2cf;
    --text-dim: #8c9bab;
    --accent: #579dff;
    --border: #38414a;
    --danger: #f87168;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: var(--board-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  .spacer { flex: 1; }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    color: var(--text);
    background: transparent;
    font-size: 14px;
  }
  .btn {
    background: var(--col-bg);
    padding: 7px 12px;
    border: 1px solid var(--border);
  }
  .btn:hover { background: var(--card-hover); }
  .btn-primary { background: var(--accent); color: #1d2125; font-weight: 600; border: none; }
  .btn-primary:hover { background: #85b8ff; }

  .board {
    flex: 1;
    display: flex;
    gap: 14px;
    padding: 16px;
    overflow-x: auto;
    align-items: flex-start;
  }
  .column {
    background: var(--col-bg);
    border-radius: 10px;
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    max-height: 100%;
  }
  .col-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
  }
  .col-title {
    flex: 1;
    font-weight: 600;
    font-size: 14px;
    background: transparent;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 4px 6px;
    outline: none;
  }
  .col-title:focus { border-color: var(--accent); background: var(--bg); }
  .col-count {
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 6px;
  }
  .icon-btn {
    color: var(--text-dim);
    padding: 4px 7px;
    border-radius: 5px;
    font-size: 15px;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--card-hover); color: var(--text); }
  .icon-btn.danger:hover { color: var(--danger); }

  .cards {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 10px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 14px;
    line-height: 1.4;
    border: 1px solid var(--border);
    cursor: grab;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }
  .card:hover { background: var(--card-hover); }
  .card.dragging { opacity: .4; }
  .card .del {
    position: absolute;
    top: 4px; right: 4px;
    display: none;
    color: var(--text-dim);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .card:hover .del { display: block; }
  .card .del:hover { color: var(--danger); background: var(--bg); }

  .cards.drag-over { outline: 2px dashed var(--accent); outline-offset: -4px; border-radius: 8px; }

  .add-card {
    margin: 4px 8px 10px;
    color: var(--text-dim);
    padding: 7px 10px;
    border-radius: 6px;
    text-align: left;
    font-size: 14px;
  }
  .add-card:hover { background: var(--card-hover); color: var(--text); }
  .add-form { margin: 4px 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  .add-form textarea {
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 56px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px;
    outline: none;
  }
  .add-form .row { display: flex; gap: 6px; align-items: center; }

  .add-column {
    width: 280px;
    flex-shrink: 0;
    background: rgba(255,255,255,.04);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    padding: 12px;
    border-radius: 10px;
    text-align: left;
  }
  .add-column:hover { background: rgba(255,255,255,.08); color: var(--text); }

  .cards::-webkit-scrollbar, .board::-webkit-scrollbar { height: 10px; width: 10px; }
  .cards::-webkit-scrollbar-thumb, .board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
</style>
</head>
<body>
  <header>
    <h1>Trel<span>los</span></h1>
    <span class="col-count" id="stat"></span>
    <div class="spacer"></div>
    <button class="btn" id="export">Export</button>
    <button class="btn" id="import">Import</button>
    <button class="btn" id="reset">Reset</button>
  </header>
  <div class="board" id="board"></div>
  <input type="file" id="file" accept="application/json" hidden>

<script>
const KEY = "trellos.board.v1";

const seed = () => ({
  columns: [
    { id: cid(), title: "To Do", cards: [
      { id: cid(), text: "Click a card area below to add tasks" },
      { id: cid(), text: "Drag cards between columns" },
    ]},
    { id: cid(), title: "In Progress", cards: [] },
    { id: cid(), title: "Done", cards: [] },
  ]
});

function cid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return seed();
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
  renderStat();
}

const board = document.getElementById("board");

function renderStat() {
  const cols = state.columns.length;
  const cards = state.columns.reduce((n, c) => n + c.cards.length, 0);
  document.getElementById("stat").textContent = cols + " lists · " + cards + " cards";
}

function render() {
  board.innerHTML = "";
  state.columns.forEach(col => board.appendChild(renderColumn(col)));

  const addCol = document.createElement("button");
  addCol.className = "add-column";
  addCol.textContent = "+ Add another list";
  addCol.onclick = () => {
    state.columns.push({ id: cid(), title: "New List", cards: [] });
    save(); render();
    const titles = document.querySelectorAll(".col-title");
    titles[titles.length - 1]?.focus();
  };
  board.appendChild(addCol);
  renderStat();
}

function renderColumn(col) {
  const el = document.createElement("div");
  el.className = "column";
  el.dataset.col = col.id;

  const head = document.createElement("div");
  head.className = "col-head";

  const title = document.createElement("input");
  title.className = "col-title";
  title.value = col.title;
  title.onchange = () => { col.title = title.value.trim() || "Untitled"; save(); };
  title.onkeydown = e => { if (e.key === "Enter") title.blur(); };

  const count = document.createElement("span");
  count.className = "col-count";
  count.textContent = col.cards.length;

  const del = document.createElement("button");
  del.className = "icon-btn danger";
  del.textContent = "✕";
  del.title = "Delete list";
  del.onclick = () => {
    if (col.cards.length && !confirm('Delete list "' + col.title + '" and its ' + col.cards.length + ' cards?')) return;
    state.columns = state.columns.filter(c => c.id !== col.id);
    save(); render();
  };

  head.append(title, count, del);
  el.appendChild(head);

  const cards = document.createElement("div");
  cards.className = "cards";
  cards.dataset.col = col.id;
  col.cards.forEach(card => cards.appendChild(renderCard(card, col)));

  cards.addEventListener("dragover", e => {
    e.preventDefault();
    cards.classList.add("drag-over");
    const after = afterElement(cards, e.clientY);
    const dragging = document.querySelector(".dragging");
    if (!dragging) return;
    if (after == null) cards.appendChild(dragging);
    else cards.insertBefore(dragging, after);
  });
  cards.addEventListener("dragleave", () => cards.classList.remove("drag-over"));
  cards.addEventListener("drop", e => {
    e.preventDefault();
    cards.classList.remove("drag-over");
    commitOrder();
  });

  el.appendChild(cards);

  // add card
  const addBtn = document.createElement("button");
  addBtn.className = "add-card";
  addBtn.textContent = "+ Add a card";
  addBtn.onclick = () => openAddForm(el, cards, col, addBtn);
  el.appendChild(addBtn);

  return el;
}

function openAddForm(colEl, cardsEl, col, addBtn) {
  addBtn.style.display = "none";
  const form = document.createElement("div");
  form.className = "add-form";
  const ta = document.createElement("textarea");
  ta.placeholder = "Enter card text… (Enter to add, Esc to cancel)";
  const row = document.createElement("div");
  row.className = "row";
  const add = document.createElement("button");
  add.className = "btn-primary";
  add.style.padding = "7px 14px";
  add.textContent = "Add";
  const cancel = document.createElement("button");
  cancel.className = "icon-btn";
  cancel.textContent = "Cancel";
  row.append(add, cancel);
  form.append(ta, row);
  colEl.insertBefore(form, addBtn);
  ta.focus();

  const close = () => { form.remove(); addBtn.style.display = ""; };
  const commit = () => {
    const text = ta.value.trim();
    if (text) {
      col.cards.push({ id: cid(), text });
      save();
      cardsEl.appendChild(renderCard(col.cards[col.cards.length - 1], col));
      colEl.querySelector(".col-count").textContent = col.cards.length;
      cardsEl.scrollTop = cardsEl.scrollHeight;
    }
    ta.value = "";
    ta.focus();
  };
  add.onclick = commit;
  cancel.onclick = close;
  ta.onkeydown = e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); commit(); }
    if (e.key === "Escape") close();
  };
}

function renderCard(card, col) {
  const el = document.createElement("div");
  el.className = "card";
  el.draggable = true;
  el.dataset.card = card.id;

  const span = document.createElement("span");
  span.textContent = card.text;
  el.appendChild(span);

  const del = document.createElement("button");
  del.className = "del";
  del.textContent = "✕";
  del.title = "Delete card";
  del.onclick = e => {
    e.stopPropagation();
    col.cards = col.cards.filter(c => c.id !== card.id);
    save();
    el.closest(".column").querySelector(".col-count").textContent = col.cards.length;
    el.remove();
  };
  el.appendChild(del);

  // double-click to edit
  el.ondblclick = () => {
    const ta = document.createElement("textarea");
    ta.value = card.text;
    ta.style.cssText = "width:100%;font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);border:1px solid var(--accent);border-radius:6px;padding:6px;resize:vertical;outline:none;";
    el.replaceWith(ta);
    ta.focus();
    ta.selectionStart = ta.value.length;
    const finish = (keep) => {
      if (keep) { card.text = ta.value.trim() || card.text; save(); }
      ta.replaceWith(renderCard(card, col));
    };
    ta.onblur = () => finish(true);
    ta.onkeydown = e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ta.blur(); }
      if (e.key === "Escape") { ta.onblur = null; finish(false); }
    };
  };

  el.addEventListener("dragstart", () => el.classList.add("dragging"));
  el.addEventListener("dragend", () => { el.classList.remove("dragging"); commitOrder(); });

  return el;
}

function afterElement(container, y) {
  const els = [...container.querySelectorAll(".card:not(.dragging)")];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element || null;
}

// rebuild state order from DOM after drag
function commitOrder() {
  const byId = {};
  state.columns.forEach(c => c.cards.forEach(card => byId[card.id] = card));
  state.columns.forEach(col => {
    const colEl = board.querySelector('.cards[data-col="' + col.id + '"]');
    if (!colEl) return;
    const ids = [...colEl.querySelectorAll(".card")].map(c => c.dataset.card);
    col.cards = ids.map(id => byId[id]).filter(Boolean);
  });
  save();
  // refresh counts
  state.columns.forEach(col => {
    const colEl = board.querySelector('.column[data-col="' + col.id + '"]');
    if (colEl) colEl.querySelector(".col-count").textContent = col.cards.length;
  });
}

// toolbar
document.getElementById("reset").onclick = () => {
  if (confirm("Reset board to default? This erases everything.")) {
    state = seed(); save(); render();
  }
};
document.getElementById("export").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "trellos-board.json";
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("import").onclick = () => document.getElementById("file").click();
document.getElementById("file").onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (!data.columns) throw new Error("bad file");
      state = data; save(); render();
    } catch (err) { alert("Invalid board file."); }
  };
  r.readAsText(f);
  e.target.value = "";
};

render();
</script>
</body>
</html>
